<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول - الكنيسة الإنجيلية المشيخية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f5f1eb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: #ffffff;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid #e8e2d9;
        }
        .login-container h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1a2a3a;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-container .subtitle {
            text-align: center;
            color: #7a8291;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #3d4552;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e8e2d9;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            background: #faf8f6;
            transition: border 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #c9a87c;
            box-shadow: 0 0 0 4px rgba(201,168,124,0.15);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            background: linear-gradient(135deg, #c9a87c, #b8925e);
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(201,168,124,0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(201,168,124,0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error-message {
            color: #c0392b;
            font-size: 0.9rem;
            margin-top: 12px;
            text-align: center;
            min-height: 24px;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 16px;
            color: #7a8291;
        }
        .loading.show {
            display: block;
        }
        .loading i {
            margin-left: 8px;
        }
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: #7a8291;
        }
        .footer-text a {
            color: #c9a87c;
            font-weight: 600;
            text-decoration: none;
        }
        .footer-text a:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1><i class="fas fa-church" style="color:#c9a87c;"></i> تسجيل الدخول</h1>
        <p class="subtitle">أدخل بريدك الإلكتروني وكلمة المرور</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" required placeholder="example@domain.com" />
            </div>
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" required placeholder="أدخل كلمة المرور" minlength="6" />
            </div>
            <button type="submit" class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> دخول</button>
            <div id="errorMessage" class="error-message"></div>
            <div class="loading" id="loadingIndicator"><i class="fas fa-spinner fa-spin"></i> جاري التحقق...</div>
        </form>

        <div class="footer-text">
            ليس لديك حساب؟ <a href="#" id="createAccountLink">إنشاء حساب جديد</a>
        </div>
    </div>

    <!-- Import Firebase SDK via importmap -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "firebase/auth";
        import { getDatabase, ref, get, set } from "firebase/database";

        // 🔥 إعدادات Firebase (تأكد من استبدالها ببيانات مشروعك)
        const firebaseConfig = {
            apiKey: "AIzaSyBn58yFwHcStPr23UClRLjIxSEQ671-I5Y",
            authDomain: "wep-site-ch.firebaseapp.com",
            databaseURL: "https://wep-site-ch-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "wep-site-ch",
            storageBucket: "wep-site-ch.firebasestorage.app",
            messagingSenderId: "892256170869",
            appId: "1:892256170869:web:eff22b472e848c72c7993c"
        };

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ضبط استمرار الجلسة
        setPersistence(auth, browserLocalPersistence)
            .then(() => console.log('✅ تم ضبط استمرار المصادقة محلياً'))
            .catch(err => console.warn('⚠️ خطأ في ضبط استمرار المصادقة:', err));

        // عناصر DOM
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('errorMessage');
        const loadingDiv = document.getElementById('loadingIndicator');
        const createLink = document.getElementById('createAccountLink');

        // حالة تسجيل الدخول (تسجيل الدخول أو إنشاء حساب)
        let isLoginMode = true;

        // تبديل النص والوظيفة
        createLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> دخول';
                createLink.innerHTML = 'ليس لديك حساب؟ <span style="color:#c9a87c;">إنشاء حساب جديد</span>';
                document.querySelector('.subtitle').textContent = 'أدخل بريدك الإلكتروني وكلمة المرور';
            } else {
                loginBtn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء حساب';
                createLink.innerHTML = 'لديك حساب؟ <span style="color:#c9a87c;">تسجيل الدخول</span>';
                document.querySelector('.subtitle').textContent = 'أنشئ حساباً جديداً للوصول إلى المنصة';
            }
            errorDiv.textContent = '';
        });

        // دالة مساعدة لعرض الأخطاء
        function showError(msg) {
            errorDiv.textContent = msg;
            loadingDiv.classList.remove('show');
            loginBtn.disabled = false;
        }

        // دالة التوجيه حسب الدور
        async function redirectBasedOnRole(user) {
            try {
                const uid = user.uid;
                const userRef = ref(db, `users/${uid}`);
                const snapshot = await get(userRef);
                
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    const role = userData.role || 'user'; // افتراضي user
                    console.log(`✅ دور المستخدم: ${role}`);
                    
                    if (role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'index.html'; // الصفحة الرئيسية للمستخدم العادي
                    }
                } else {
                    // إذا لم يكن للمستخدم بيانات في قاعدة البيانات، ننشئها بدور user افتراضي
                    console.warn('⚠️ لا توجد بيانات للمستخدم، سيتم إنشاء سجل جديد بدور user');
                    await set(userRef, {
                        name: user.displayName || 'مستخدم',
                        email: user.email,
                        role: 'user',
                        createdAt: Date.now()
                    });
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error('❌ خطأ في جلب دور المستخدم:', error);
                showError('حدث خطأ في التحقق من صلاحياتك. حاول مرة أخرى.');
                // في حال فشل جلب الدور، نوجه إلى الصفحة الرئيسية كحل احتياطي
                // window.location.href = 'index.html';
            }
        }

        // معالجة نموذج تسجيل الدخول / إنشاء حساب
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('الرجاء ملء جميع الحقول');
                return;
            }
            if (password.length < 6) {
                showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }

            // تعطيل الزر وإظهار مؤشر التحميل
            loginBtn.disabled = true;
            loadingDiv.classList.add('show');
            errorDiv.textContent = '';

            try {
                let userCredential;
                if (isLoginMode) {
                    // تسجيل الدخول
                    userCredential = await signInWithEmailAndPassword(auth, email, password);
                    console.log('✅ تم تسجيل الدخول بنجاح:', userCredential.user.email);
                } else {
                    // إنشاء حساب جديد
                    userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    console.log('✅ تم إنشاء الحساب بنجاح:', userCredential.user.email);
                    // ننشئ له سجل في قاعدة البيانات بدور user
                    const uid = userCredential.user.uid;
                    await set(ref(db, `users/${uid}`), {
                        name: 'مستخدم جديد',
                        email: email,
                        role: 'user',
                        createdAt: Date.now()
                    });
                    console.log('✅ تم إنشاء سجل المستخدم في قاعدة البيانات');
                }

                // بعد نجاح المصادقة، ننتظر حتى يتم تحديث حالة المستخدم ثم نوجه
                // لكننا سنستخدم onAuthStateChanged للتعامل مع التوجيه
                // لكن بما أننا بالفعل مسجلون، نستدعي التوجيه مباشرة
                await redirectBasedOnRole(userCredential.user);

            } catch (error) {
                console.error('❌ فشل عملية المصادقة:', error);
                let msg = 'فشل تسجيل الدخول. تحقق من البريد وكلمة المرور.';
                if (error.code === 'auth/user-not-found') {
                    msg = 'لا يوجد حساب بهذا البريد الإلكتروني.';
                } else if (error.code === 'auth/wrong-password') {
                    msg = 'كلمة المرور غير صحيحة.';
                } else if (error.code === 'auth/email-already-in-use') {
                    msg = 'هذا البريد الإلكتروني مستخدم بالفعل.';
                } else if (error.code === 'auth/weak-password') {
                    msg = 'كلمة المرور ضعيفة (يجب أن تكون 6 أحرف على الأقل).';
                } else if (error.code === 'auth/invalid-email') {
                    msg = 'البريد الإلكتروني غير صحيح.';
                } else {
                    msg = error.message;
                }
                showError(msg);
            } finally {
                loginBtn.disabled = false;
                loadingDiv.classList.remove('show');
            }
        });

        // التحقق من حالة المصادقة عند تحميل الصفحة (إذا كان المستخدم مسجلاً بالفعل)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                console.log('👤 مستخدم مسجل بالفعل:', user.email);
                // التحقق من دوره وتوجيهه فوراً
                await redirectBasedOnRole(user);
            } else {
                console.log('👤 لا يوجد مستخدم مسجل');
                // نبقى في صفحة تسجيل الدخول
            }
        });

        // عند نجاح تسجيل الدخول، سنقوم بالتوجيه عبر onAuthStateChanged، ولكننا نستدعي التوجيه مباشرة بعد المصادقة
        // لضمان سرعة التوجيه.

        console.log('✅ تم تحميل صفحة تسجيل الدخول بنجاح');
    </script>

</body>
</html>
